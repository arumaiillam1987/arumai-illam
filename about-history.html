<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR SAME AS HOME -->

<div class="section" data-aos="fade-up">
<h1>Our Journey of Compassion</h1>

<p>
Founded in 1987, Arumai Illam has served vulnerable communities with dignity and care.
</p>

<p>
From a small initiative to a trusted institution, we continue our mission despite funding challenges.
</p>

</div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({duration:1000, once:true});

function toggleMenu(){
 document.getElementById("navLinks").classList.toggle("show");
}

function toggleDropdown(e){
 e.stopPropagation();
 e.target.parentElement.classList.toggle("show");
}

window.onclick = function(){
 document.querySelectorAll(".dropdown").forEach(d=>d.classList.remove("show"));
}

/* COUNTER */
const counters=document.querySelectorAll('.counter');
counters.forEach(c=>{
 let update=()=>{
  let target=+c.dataset.target;
  let count=+c.innerText;
  let inc=target/100;
  if(count<target){
    c.innerText=Math.ceil(count+inc);
    setTimeout(update,20);
  } else { c.innerText=target; }
 };
 if(c) update();
});
</script>
  
<!-- SCRIPT -->
</body>
</html>
